<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 280px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1e293b; color: #e2e8f0; }
    .header { padding: 16px; border-bottom: 1px solid #334155; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header p { font-size: 11px; color: #64748b; margin-top: 2px; }
    .body { padding: 12px 16px; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
    .toggle-row span { font-size: 13px; }
    .toggle-switch { position: relative; width: 40px; height: 22px; }
    .toggle-switch input { display: none; }
    .toggle-switch label { display: block; width: 40px; height: 22px; background: #475569; border-radius: 11px; cursor: pointer; transition: background .2s; }
    .toggle-switch input:checked + label { background: #2563eb; }
    .toggle-switch label::after { content: ''; position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform .2s; }
    .toggle-switch input:checked + label::after { transform: translateX(18px); }
    .stat { padding: 8px 0; font-size: 12px; color: #94a3b8; border-top: 1px solid #334155; }
    .stat strong { color: #e2e8f0; }
    .session-link { display: block; padding: 8px 0; font-size: 12px; color: #3b82f6; text-decoration: none; cursor: pointer; border: none; background: none; text-align: left; }
    .session-link:hover { color: #60a5fa; }
    .footer { padding: 10px 16px; border-top: 1px solid #334155; font-size: 10px; color: #475569; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <h1>QA Feedback Tool</h1>
    <p>v3.0.0</p>
  </div>
  <div class="body">
    <div class="toggle-row">
      <span>QA 검수 모드</span>
      <div class="toggle-switch">
        <input type="checkbox" id="qaToggle">
        <label for="qaToggle"></label>
      </div>
    </div>
    <div class="stat">
      피드백: <strong id="feedbackCount">0</strong>건
    </div>
    <button class="session-link" id="sessionListBtn">세션 목록 열기</button>
  </div>
  <div class="footer">Alt+Q로 토글</div>
  <script src="popup.js"></script>
</body>
</html>
